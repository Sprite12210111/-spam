<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스팸 플래너 v16</title>
    <style>
        :root {
            --theme-color: #dde3ff;
            --theme-text: #444;
            --bg-color: #f8f9fc;
            --text-main: #2d2d2f;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Pretendard', sans-serif;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        .main-wrapper {
            display: flex; max-width: 1200px; margin: 0 auto;
            padding: 40px 20px; gap: 30px; justify-content: center;
        }

        .nav-bar {
            position: sticky; top: 40px; width: 70px; height: fit-content;
            background: white; border-radius: 20px; display: flex; flex-direction: column;
            gap: 15px; padding: 20px 0; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .nav-btn {
            width: 45px; height: 45px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; border: none; background: #f2f2f7; transition: 0.2s;
        }
        .nav-btn.active { background: var(--theme-color); color: var(--theme-text) !important; font-weight: bold; }

        .content-section { display: none; width: 100%; gap: 25px; }
        .content-section.active { display: flex; }
        .column { display: flex; flex-direction: column; gap: 25px; flex: 1; min-width: 360px; }

        .card { 
            background: white; border-radius: 25px; padding: 22px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02);
        }
        .card-title { font-size: 0.8rem; font-weight: 800; margin-bottom: 15px; color: var(--theme-text); opacity: 0.7; }

        /* 타이머 탭 */
        .timer-tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #f2f2f7; padding: 5px; border-radius: 12px; }
        .t-tab { flex: 1; border: none; padding: 8px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; cursor: pointer; background: transparent; color: #888; transition: 0.2s; }
        .t-tab.active { background: white; color: var(--theme-text); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .timer-content { display: none; }
        .timer-content.active { display: block; }

        /* 공통 텍스트/버튼 */
        .now-info { text-align: center; margin-bottom: 10px; }
        #now-date { font-size: 0.85rem; color: #888; font-weight: bold; }
        #now-clock { font-size: 1.4rem; font-weight: 900; color: var(--theme-text); margin-top: 2px; }

        .btn { border: none; padding: 10px 16px; border-radius: 10px; font-size: 0.8rem; cursor: pointer; font-weight: 800 !important; transition: 0.2s; }
        .btn-main { background: var(--theme-color) !important; color: var(--theme-text) !important; }
        .btn-sub { background: #f2f2f7; color: #666; }

        .time-display { font-size: 2.3rem; font-weight: 900; text-align: center; margin: 5px 0; letter-spacing: -1px; color: var(--text-main); }
        .accent-time { color: var(--theme-text); }

        .prog-bg { width: 100%; height: 10px; background: #eee; border-radius: 10px; overflow: hidden; }
        #prog-fill { height: 100%; background: var(--theme-color); width: 0%; transition: 0.4s; }

        /* 드로잉 메모 확대 */
        .memo-box { background: #fafafa; border-radius: 15px; height: 350px; border: 1px solid #eee; overflow: hidden; }
        #memo-canvas { width: 100%; height: 100%; touch-action: none; cursor: crosshair; }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; flex: 1; }
        .cal-day { aspect-ratio: 1; border-radius: 12px; border: 1px solid #f5f5f5; padding: 6px; cursor: pointer; position: relative; font-weight: 700; font-size: 0.8rem; color: #444; }
        .cal-day.selected { border: 2px solid var(--theme-color); background: rgba(0,0,0,0.02); }
        .is-bday { background-color: var(--theme-color) !important; color: var(--theme-text) !important; }

        .theme-fix { position: fixed; right: 30px; bottom: 30px; background: white; padding: 10px 20px; border-radius: 50px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 1000; }
        .todo-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f8f8f8; }
        .todo-check { width: 18px; height: 18px; border-radius: 6px; border: 2.2px solid var(--theme-color); cursor: pointer; position: relative; }
        .todo-check.checked { background: var(--theme-color); }
        .todo-check.checked::after { content: '✓'; color: var(--theme-text); position: absolute; left: 2px; top: -3px; font-weight: 900; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <nav class="nav-bar">
        <button class="nav-btn active" onclick="tab('planner', this)">📝</button>
        <button class="nav-btn" onclick="tab('calendar', this)">🗓️</button>
    </nav>

    <main id="planner-view" class="content-section active">
        <div class="column">
            <div class="card">
                <div class="now-info">
                    <div id="now-date">Loading...</div>
                    <div id="now-clock">00:00:00</div>
                </div>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                    <div style="background:#fcfcfd; padding:10px; border-radius:15px; text-align:center; border:1px solid #f0f0f5;">
                        <div style="font-size:0.6rem; font-weight:bold; color:#888;">6모</div><div id="dday-6" style="font-size:0.9rem; font-weight:900; color:var(--theme-text);">D-?</div>
                    </div>
                    <div style="background:#fcfcfd; padding:10px; border-radius:15px; text-align:center; border:1px solid #f0f0f5;">
                        <div style="font-size:0.6rem; font-weight:bold; color:#888;">9모</div><div id="dday-9" style="font-size:0.9rem; font-weight:900; color:var(--theme-text);">D-?</div>
                    </div>
                    <div style="background:#fcfcfd; padding:10px; border-radius:15px; text-align:center; border:1px solid #f0f0f5;">
                        <div style="font-size:0.6rem; font-weight:bold; color:#888;">수능</div><div id="dday-sn" style="font-size:0.9rem; font-weight:900; color:var(--theme-text);">D-?</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">🎵 Music</div>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="yt-url" placeholder="유튜브 URL" style="flex:1; padding:8px; border-radius:8px; border:1px solid #ddd;">
                    <button class="btn btn-main" onclick="playYT()">재생</button>
                </div>
                <div id="yt-area" style="height:120px; background:#000; border-radius:15px; margin-top:10px; overflow:hidden; display:none;">
                    <iframe id="player" style="width:100%; height:100%; border:none;"></iframe>
                </div>
            </div>

            <div class="card">
                <div class="card-title">📝 Memo </div>
                <div class="memo-box"><canvas id="memo-canvas"></canvas></div>
                <button class="btn btn-sub" style="width:100%; margin-top:10px;" onclick="clearC()">CLEAR</button>
            </div>
        </div>

        <div class="column">
            <div class="card">
                <div class="timer-tabs">
                    <button class="t-tab active" onclick="timerTab('pomo', this)">POMO</button>
                    <button class="t-tab" onclick="timerTab('timer', this)">TIMER</button>
                    <button class="t-tab" onclick="timerTab('stopw', this)">WATCH</button>
                </div>
                <div id="pomo-content" class="timer-content active">
                    <div style="text-align:center; font-size:0.75rem; font-weight:bold; color:#888; margin-bottom:5px;">공부 <input type="number" id="pomo-w" value="25" style="width:35px; border:1px solid #ddd;"> 휴식 <input type="number" id="pomo-r" value="5" style="width:35px; border:1px solid #ddd;"> <button class="btn btn-main" style="padding:2px 8px; font-size:0.6rem;" onclick="setPomo()">SET</button></div>
                    <div id="p-disp" class="time-display">25:00</div>
                    <div style="display:flex; justify-content:center; gap:8px;"><button class="btn btn-main" onclick="togglePomo()">START/STOP</button><button class="btn btn-sub" onclick="resetPomo()">RESET</button></div>
                </div>
                <div id="timer-content" class="timer-content">
                    <div style="text-align:center; font-size:0.75rem; font-weight:bold; color:#888; margin-bottom:5px;"><input type="number" id="tm-m" value="10" style="width:35px; border:1px solid #ddd;">분 <input type="number" id="tm-s" value="0" style="width:35px; border:1px solid #ddd;">초 <button class="btn btn-main" style="padding:2px 8px; font-size:0.6rem;" onclick="setTimer()">SET</button></div>
                    <div id="tm-disp" class="time-display">10:00</div>
                    <div style="display:flex; justify-content:center; gap:8px;"><button class="btn btn-main" onclick="toggleTimer()">START/STOP</button><button class="btn btn-sub" onclick="resetTimer()">RESET</button></div>
                </div>
                <div id="stopw-content" class="timer-content">
                    <div style="height:28px;"></div>
                    <div id="sw-disp" class="time-display">00:00:00</div>
                    <div style="display:flex; justify-content:center; gap:8px;"><button class="btn btn-main" onclick="toggleSW()">START/STOP</button><button class="btn btn-sub" onclick="resetSW()">RESET</button></div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">✨ Total Study Time</div>
                <div id="tt-disp" class="time-display accent-time">00:00:00</div>
                <div style="display:flex; justify-content:center; gap:8px;"><button id="tt-btn" class="btn btn-main" onclick="toggleTT()">STOP</button><button class="btn btn-sub" onclick="resetTT()">RESET</button></div>
            </div>

            <div class="card">
                <div class="card-title">✅ Progress Checklist</div>
                <div class="prog-bg" style="margin-bottom:15px;"><div id="prog-fill"></div></div>
                <div style="display:flex; gap:8px; margin-bottom:12px;">
                    <input type="text" id="todo-in" placeholder="할 일 입력" style="flex:1; border:1px solid #ddd; border-radius:8px;" onkeypress="if(event.keyCode==13) addTodo()">
                    <button class="btn btn-main" onclick="addTodo()">+</button>
                </div>
                <div id="todo-list" style="max-height:280px; overflow-y:auto;"></div>
            </div>
        </div>
    </main>

    <main id="calendar-view" class="content-section">
        <div class="card" style="display:flex; gap:20px; width:100%;">
            <div style="flex:1;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <button class="btn btn-sub" onclick="moveM(-1)">◀</button>
                    <h2 id="cal-title" style="margin:0; font-size:1rem; color:var(--theme-text);"></h2>
                    <button class="btn btn-sub" onclick="moveM(1)">▶</button>
                </div>
                <div id="cal-grid" class="cal-grid"></div>
            </div>
            <div style="width:250px; border-left:1px solid #eee; padding-left:20px;">
                <h3 id="sel-date" style="font-size:0.8rem; color:var(--theme-text);">DATE</h3>
                <textarea id="cal-memo" style="width:100%; height:320px; background:#fafafa; border:none; padding:10px; border-radius:12px; resize:none;" oninput="saveCal()"></textarea>
            </div>
        </div>
    </main>
</div>

<div class="theme-fix">
    <input type="color" id="theme-in" oninput="changeTheme(this.value)" style="border:none; cursor:pointer; width:30px; height:25px;">
</div>

<script>
    let db = JSON.parse(localStorage.getItem('spam_v16')) || { total: 0, todos: [], theme: "#dde3ff", calMemos: {} };
    const bdays = ["12-21", "10-13", "09-08", "09-18", "11-01", "05-05", "04-09", "04-06", "04-10", "04-19", "06-29"];

    function save() { localStorage.setItem('spam_v16', JSON.stringify(db)); }

    function getContrastColor(hex) {
        const r = parseInt(hex.substring(1, 3), 16), g = parseInt(hex.substring(3, 5), 16), b = parseInt(hex.substring(5, 7), 16);
        return ((r * 299 + g * 587 + b * 114) / 1000) > 155 ? '#333333' : '#ffffff';
    }

    function changeTheme(c) {
        db.theme = c;
        const textCol = getContrastColor(c);
        document.documentElement.style.setProperty('--theme-color', c);
        document.documentElement.style.setProperty('--theme-text', textCol);
        save(); renderCal();
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('now-date').innerText = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일`;
        document.getElementById('now-clock').innerText = now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);

    function calcDDay() {
        const target = { "sn": "2026-11-19", "6": "2026-06-04", "9": "2026-09-02" };
        const now = new Date();
        for(let key in target) {
            const d = Math.ceil((new Date(target[key]) - now) / (1000 * 60 * 60 * 24));
            document.getElementById(`dday-${key}`).innerText = d > 0 ? `D-${d}` : "D-Day";
        }
    }

    // 타이머/뽀모도로/스톱워치
    function timerTab(type, btn) {
        document.querySelectorAll('.timer-content, .t-tab').forEach(e => e.classList.remove('active'));
        document.getElementById(type+'-content').classList.add('active'); btn.classList.add('active');
    }

    let pTime = 1500, pInt = null;
    function setPomo() { pTime = document.getElementById('pomo-w').value * 60; document.getElementById('p-disp').innerText = `${document.getElementById('pomo-w').value}:00`; }
    function togglePomo() { if(pInt) { clearInterval(pInt); pInt = null; } else { pInt = setInterval(() => { if(pTime > 0) { pTime--; let m=Math.floor(pTime/60), s=pTime%60; document.getElementById('p-disp').innerText=`${m}:${s.toString().padStart(2,'0')}`; } else { clearInterval(pInt); alert("Time Over!"); pTime = document.getElementById('pomo-r').value * 60; } }, 1000); } }
    function resetPomo() { clearInterval(pInt); pInt=null; setPomo(); }

    let tmTime = 600, tmInt = null;
    function setTimer() { tmTime = (parseInt(document.getElementById('tm-m').value) * 60) + (parseInt(document.getElementById('tm-s').value) || 0); document.getElementById('tm-disp').innerText = fmt(tmTime).substring(3); }
    function toggleTimer() { if(tmInt) { clearInterval(tmInt); tmInt = null; } else { tmInt = setInterval(() => { if(tmTime > 0) { tmTime--; document.getElementById('tm-disp').innerText=fmt(tmTime).substring(3); } else { clearInterval(tmInt); alert("갯민숭달팽이스터에그"); } }, 1000); } }
    function resetTimer() { clearInterval(tmInt); tmInt=null; setTimer(); }

    let swTime = 0, swInt = null;
    function toggleSW() { if(swInt) { clearInterval(swInt); swInt = null; } else { swInt = setInterval(() => { swTime++; document.getElementById('sw-disp').innerText=fmt(swTime); }, 1000); } }
    function resetSW() { clearInterval(swInt); swInt=null; swTime=0; document.getElementById('sw-disp').innerText="00:00:00"; }

    let ttInt = null;
    function toggleTT() {
        const b = document.getElementById('tt-btn');
        if(ttInt) { clearInterval(ttInt); ttInt = null; b.innerText="START"; }
        else { ttInt = setInterval(() => { db.total++; document.getElementById('tt-disp').innerText=fmt(db.total); save(); }, 1000); b.innerText="STOP"; }
    }
    function resetTT() { db.total=0; document.getElementById('tt-disp').innerText="00:00:00"; save(); }

    // 할 일
    function addTodo() {
        const v = document.getElementById('todo-in').value; if(!v) return;
        db.todos.push({txt: v, done: false}); document.getElementById('todo-in').value = ""; renderTodos(); save();
    }
    function renderTodos() {
        const l = document.getElementById('todo-list'); l.innerHTML = "";
        db.todos.forEach((t, i) => {
            l.innerHTML += `<div class="todo-item"><div class="todo-check ${t.done?'checked':''}" onclick="toggleTodo(${i})"></div><span style="flex:1; cursor:pointer; font-size:0.85rem; ${t.done?'text-decoration:line-through;color:#bbb':''}" onclick="toggleTodo(${i})">${t.txt}</span><span onclick="delTodo(${i})" style="cursor:pointer; color:#ffbabb; font-weight:bold;">×</span></div>`;
        });
        document.getElementById('prog-fill').style.width = (db.todos.length ? Math.round((db.todos.filter(x=>x.done).length / db.todos.length) * 100) : 0) + "%";
    }
    function toggleTodo(i) { db.todos[i].done = !db.todos[i].done; renderTodos(); save(); }
    function delTodo(i) { db.todos.splice(i, 1); renderTodos(); save(); }

    function playYT() {
        const url = document.getElementById('yt-url').value;
        let id = url.includes("v=") ? url.split("v=")[1].split("&")[0] : url.split("/").pop().split("?")[0];
        if(id) { document.getElementById('yt-area').style.display = 'block'; document.getElementById('player').src = `https://www.youtube.com/embed/${id}?autoplay=1`; }
    }

    // 메모장
    let cv, cx, draw = false;
    function initCanvas() {
        cv = document.getElementById('memo-canvas'); cx = cv.getContext('2d');
        cv.width = cv.offsetWidth; cv.height = cv.offsetHeight;
        cx.lineCap = 'round'; cx.lineWidth = 3; cx.strokeStyle = "#333";
        const getP = (e) => {
            const r = cv.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - r.left, y: clientY - r.top };
        };
        cv.onmousedown = (e) => { draw = true; const p = getP(e); cx.beginPath(); cx.moveTo(p.x, p.y); };
        cv.onmousemove = (e) => { if(draw) { const p = getP(e); cx.lineTo(p.x, p.y); cx.stroke(); } };
        window.addEventListener('mouseup', () => { draw = false; });
        cv.ontouchstart = (e) => { e.preventDefault(); draw = true; const p = getP(e); cx.beginPath(); cx.moveTo(p.x, p.y); };
        cv.ontouchmove = (e) => { if(draw) { e.preventDefault(); const p = getP(e); cx.lineTo(p.x, p.y); cx.stroke(); } };
        cv.ontouchend = () => { draw = false; };
    }
    function clearC() { cx.clearRect(0,0,cv.width,cv.height); }

    // 캘린더
    let cur = new Date(), selK = null;
    function renderCal() {
        const g = document.getElementById('cal-grid'); g.innerHTML = "";
        const y = cur.getFullYear(), m = cur.getMonth();
        document.getElementById('cal-title').innerText = `${y}년 ${m+1}월`;
        ['일','월','화','수','목','금','토'].forEach(d => g.innerHTML += `<div style="text-align:center; font-size:0.6rem; color:#bbb; font-weight:800;">${d}</div>`);
        const first = new Date(y, m, 1).getDay(), last = new Date(y, m+1, 0).getDate();
        for(let i=0; i<first; i++) g.innerHTML += `<div></div>`;
        for(let d=1; d<=last; d++) {
            const k = `${y}-${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
            const isB = bdays.includes(k.substring(5)), div = document.createElement('div');
            div.className = `cal-day ${isB?'is-bday':''} ${selK===k?'selected':''}`;
            div.innerHTML = `<span>${d}</span>${isB?'<div style="position:absolute; bottom:2px; right:2px; font-size:0.8rem;">🎂</div>':''}`;
            div.onclick = () => { selK = k; document.getElementById('sel-date').innerText=k; document.getElementById('cal-memo').value=db.calMemos[k]||""; renderCal(); };
            g.appendChild(div);
        }
    }
    function moveM(v) { cur.setMonth(cur.getMonth()+v); renderCal(); }
    function saveCal() { if(selK) { db.calMemos[selK] = document.getElementById('cal-memo').value; save(); } }

    function fmt(s) {
        const h=Math.floor(s/3600).toString().padStart(2,'0'), m=Math.floor((s%3600)/60).toString().padStart(2,'0'), sec=(s%60).toString().padStart(2,'0');
        return `${h}:${m}:${sec}`;
    }

    function tab(v, btn) {
        document.querySelectorAll('.content-section, .nav-btn').forEach(e => e.classList.remove('active'));
        document.getElementById(v+'-view').classList.add('active'); btn.classList.add('active');
        if(v==='calendar') renderCal();
        if(v==='planner') setTimeout(initCanvas, 100);
    }

    window.onload = () => {
        calcDDay(); updateClock();
        document.getElementById('tt-disp').innerText = fmt(db.total);
        document.getElementById('theme-in').value = db.theme;
        changeTheme(db.theme); renderTodos(); initCanvas();
        if(!ttInt) toggleTT();
    };
</script>
</body>
</html>
